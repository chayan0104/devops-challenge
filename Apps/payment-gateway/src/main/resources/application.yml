server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: payment-gateway
  lifecycle:
    timeout-per-shutdown-phase: 15s

processor:
  url: ${PROCESSOR_URL:http://localhost:8081}
  api-key: ${PROCESSOR_API_KEY:changeme-shared-secret}
  connect-timeout-ms: ${PROCESSOR_CONNECT_TIMEOUT_MS:1000}
  read-timeout-ms: ${PROCESSOR_READ_TIMEOUT_MS:3000}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,prometheus,info
      path-mapping:
        health: healthz
        prometheus: metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

resilience4j:
  circuitbreaker:
    instances:
      processor:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      processor:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
  timelimiter:
    instances:
      processor:
        timeout-duration: 4s

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId}] [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.example.paymentgateway: INFO
