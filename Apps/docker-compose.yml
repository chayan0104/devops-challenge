version: "3.9"

services:
  payment-processor:
    build:
      context: ./payment-processor
    image: devops-challenge/payment-processor:1.0.0
    ports:
      - "8081:8080"
    environment:
      PROCESSOR_API_KEY: ${PROCESSOR_API_KEY:-changeme-shared-secret}
      SIMULATED_FAILURE_RATE_PERCENT: ${SIMULATED_FAILURE_RATE_PERCENT:-0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - payments-net

  payment-gateway:
    build:
      context: ./payment-gateway
    image: devops-challenge/payment-gateway:1.0.0
    ports:
      - "8080:8080"
    environment:
      PROCESSOR_URL: http://payment-processor:8080
      PROCESSOR_API_KEY: ${PROCESSOR_API_KEY:-changeme-shared-secret}
    depends_on:
      payment-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - payments-net

networks:
  payments-net:
    driver: bridge
