apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-gateway-pdb
  namespace: payments
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: payment-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-processor-pdb
  namespace: payments
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: payment-processor
